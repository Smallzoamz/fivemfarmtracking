<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background dark rounded square with premium neon border -->
  <rect x="16" y="16" width="480" height="480" rx="128" fill="#030712" stroke="#10B981" stroke-width="12" />
  
  <!-- Outer glowing ring of the stopwatch -->
  <circle cx="256" cy="276" r="120" fill="none" stroke="#10B981" stroke-width="20" stroke-linecap="round" stroke-dasharray="500 150" />
  
  <!-- Stopwatch Top Button -->
  <rect x="232" y="110" width="48" height="32" rx="6" fill="#10B981" />
  <rect x="244" y="90" width="24" height="20" rx="4" fill="#059669" />
  
  <!-- Stopwatch Side Buttons -->
  <rect x="120" y="140" width="28" height="18" rx="4" transform="rotate(-45 120 140)" fill="#059669" />
  <rect x="364" y="120" width="28" height="18" rx="4" transform="rotate(45 364 120)" fill="#059669" />
  
  <!-- Glowing Leaf inside stopwatch (representing farming/yield) -->
  <path d="M256 190 C300 190 330 225 330 276 C330 320 290 350 256 350 C222 350 182 320 182 276 C182 225 212 190 256 190 Z" fill="none" stroke="#10B981" stroke-width="14" stroke-linecap="round" />
  <path d="M256 350 C256 300 256 220 256 200" fill="none" stroke="#34D399" stroke-width="10" stroke-linecap="round" />
  
  <!-- Leaf Vein Accents -->
  <path d="M256 280 C276 270 296 260 300 240" fill="none" stroke="#34D399" stroke-width="8" stroke-linecap="round" />
  <path d="M256 305 C236 295 216 285 212 265" fill="none" stroke="#34D399" stroke-width="8" stroke-linecap="round" />
  
  <!-- Digital HUD Accents -->
  <circle cx="256" cy="50" r="10" fill="#10B981" />
  <circle cx="216" cy="54" r="6" fill="#059669" />
  <circle cx="296" cy="54" r="6" fill="#059669" />
</svg>
